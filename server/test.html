<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test WebSocket FastAPI</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        #chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 80%;
            word-wrap: break-word;
        }
        .user {
            align-self: flex-end;
            background-color: #007bff;
            color: white;
        }
        .ai {
            align-self: flex-start;
            background-color: #e1e1e1;
            color: #333;
        }
        .system {
            align-self: center;
            background-color: #ffeb3b;
            color: #333;
            font-size: 0.9em;
        }
        #input-area {
            display: flex;
            padding: 20px;
            background: white;
            border-top: 1px solid #ddd;
            gap: 10px;
        }
        input, select, button {
            padding: 10px;
            font-size: 16px;
        }
        input {
            flex: 1;
        }
        button {
            cursor: pointer;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:disabled {
            background-color: #ccc;
        }
        #status {
            padding: 5px;
            text-align: center;
            font-size: 0.8em;
            background: #ddd;
        }
    </style>
</head>
<body>

    <div id="status">Stato: Disconnesso</div>

    <div id="chat-container">
        <!-- I messaggi appariranno qui -->
        <div class="message system">Benvenuto. Clicca "Connetti" per iniziare.</div>
    </div>

    <div id="input-area">
        <select id="language">
            <option value="italiano">Italiano</option>
            <option value="inglese">Inglese</option>
            <option value="spagnolo">Spagnolo</option>
        </select>
        <input type="text" id="message-input" placeholder="Scrivi un messaggio..." disabled>
        <button id="connect-btn" onclick="toggleConnection()">Connetti</button>
        <button id="send-btn" onclick="sendMessage()" disabled>Invia</button>
    </div>

    <script>
        let ws;
        let isConnected = false;

        // Memorizza la cronologia locale per mandarla al server ogni volta
        // (Simula un client che tiene il contesto)
        let chatHistory = [];

        const statusDiv = document.getElementById('status');
        const connectBtn = document.getElementById('connect-btn');
        const sendBtn = document.getElementById('send-btn');
        const msgInput = document.getElementById('message-input');
        const chatContainer = document.getElementById('chat-container');

        function toggleConnection() {
            if (isConnected) {
                ws.close();
            } else {
                // Modifica l'URL se il server è su una porta diversa o host remoto
                ws = new WebSocket("ws://localhost:8000/chat");

                ws.onopen = () => {
                    isConnected = true;
                    statusDiv.textContent = "Stato: Connesso";
                    statusDiv.style.backgroundColor = "#d4edda";
                    connectBtn.textContent = "Disconnetti";
                    connectBtn.style.backgroundColor = "#dc3545";
                    msgInput.disabled = false;
                    sendBtn.disabled = false;
                    msgInput.focus();
                    addMessage("system", "Connesso al server.");
                };

                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);

                    if (data.error) {
                        addMessage("system", "Errore: " + data.error);
                    } else if (data.response) {
                        addMessage("ai", data.response);

                        // Aggiungi la risposta dell'AI alla cronologia locale
                        // Nota: il server si aspetta "model" per le risposte precedenti
                        chatHistory.push({
                            role: "model",
                            content: data.response
                        });
                    }
                };

                ws.onclose = () => {
                    resetConnectionState();
                    addMessage("system", "Disconnesso dal server.");
                };

                ws.onerror = (error) => {
                    console.error("WebSocket Error:", error);
                    addMessage("system", "Errore di connessione (Controlla che il server sia acceso).");
                };
            }
        }

        function resetConnectionState() {
            isConnected = false;
            statusDiv.textContent = "Stato: Disconnesso";
            statusDiv.style.backgroundColor = "#ddd";
            connectBtn.textContent = "Connetti";
            connectBtn.style.backgroundColor = "#28a745";
            msgInput.disabled = true;
            sendBtn.disabled = true;
        }

        function sendMessage() {
            const text = msgInput.value.trim();
            const language = document.getElementById('language').value;

            if (!text) return;

            // 1. Mostra il messaggio dell'utente in UI
            addMessage("user", text);
            msgInput.value = "";

            // 2. Aggiungi il messaggio alla cronologia locale
            chatHistory.push({
                role: "user",
                content: text
            });

            // 3. Prepara il payload conforme al modello Pydantic del server
            const payload = {
                messages: chatHistory,
                language: language
            };

            // 4. Invia via WebSocket
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(payload));
            } else {
                addMessage("system", "Errore: WebSocket non connesso.");
            }
        }

        function addMessage(type, text) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight; // Auto-scroll in basso
        }

        // Permetti di inviare premendo Enter
        msgInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    </script>
</body>
</html>
